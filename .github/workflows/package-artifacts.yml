name: Package Artifacts

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-artifacts-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-version:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    outputs:
      is_release_commit: ${{ steps.release_commit.outputs.is_release_commit }}
      package_version: ${{ steps.package_version.outputs.package_version }}
      build_date: ${{ steps.package_version.outputs.build_date }}
      deb_path: ${{ steps.package_version.outputs.deb_path }}
      appimage_path: ${{ steps.package_version.outputs.appimage_path }}
      windows_zip_path: ${{ steps.package_version.outputs.windows_zip_path }}
      windows_portable_exe_path: ${{ steps.package_version.outputs.windows_portable_exe_path }}
      windows_installer_path: ${{ steps.package_version.outputs.windows_installer_path }}
      windows_msi_path: ${{ steps.package_version.outputs.windows_msi_path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      # Must run after checkout: git ls-remote needs the repository and its
      # origin remote in the workspace.
      - name: Skip packaging for release-tagged commits
        id: release_commit
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          # release.yml builds and publishes these same artifacts whenever a
          # v*.*.* tag points at this commit; packaging twice doubles the
          # Windows runner cost of every release.
          is_release_commit=false
          tag_targets="$(git ls-remote --tags origin "refs/tags/v*.*.*" | awk '{ print $1 }')"
          if grep -qx "$HEAD_SHA" <<<"$tag_targets"; then
            is_release_commit=true
            echo "Commit $HEAD_SHA is a release tag target; release.yml owns packaging"
          fi
          echo "is_release_commit=$is_release_commit" >> "$GITHUB_OUTPUT"

      - name: Resolve package version
        id: package_version
        if: steps.release_commit.outputs.is_release_commit != 'true'
        env:
          CI_BUILD_NUMBER: ${{ github.event.workflow_run.run_number || github.run_number }}
        run: bash packaging/resolve-package-version.sh

  package-linux:
    needs: resolve-version
    if: needs.resolve-version.result == 'success' && needs.resolve-version.outputs.is_release_commit != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Linux validation dependencies
        run: bash packaging/install-ubuntu-workflow-deps.sh

      - name: Build Linux artifacts in Debian 13 container
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.package_version }}
          BUILD_DATE: ${{ needs.resolve-version.outputs.build_date }}
        run: bash packaging/build-in-container.sh

      - name: Validate Linux artifacts
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.package_version }}
          BUILD_DATE: ${{ needs.resolve-version.outputs.build_date }}
          SMOKE_PROFILE_KIND: terminal-only
          SKIP_PACKAGE_BUILD: 1
        run: bash packaging/release-smoke-test.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: terminaltiler-linux-${{ needs.resolve-version.outputs.package_version }}
          path: |
            ${{ needs.resolve-version.outputs.deb_path }}
            ${{ needs.resolve-version.outputs.appimage_path }}
          if-no-files-found: error

  package-windows:
    needs: resolve-version
    if: needs.resolve-version.result == 'success' && needs.resolve-version.outputs.is_release_commit != 'true'
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cache gvsbuild GTK runtime
        continue-on-error: true
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: C:\gtk-build\gtk\x64\release
          key: windows-gtk-runtime-gvsbuild-v4-${{ runner.os }}

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Prepare native GTK/libadwaita runtime
        shell: pwsh
        run: ./packaging/setup-windows-gtk.ps1 -InstallWithGvsbuild -SkipBuildIfPresent

      - name: Build Windows artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.package_version }}
        run: ./packaging/build-windows.ps1 -PackageVersion $env:PACKAGE_VERSION -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -RequireInstallers

      - name: Validate Windows artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.package_version }}
        # GitHub-hosted Windows runners do not have an interactive desktop, so
        # GtkApplication exits before activation. Keep build, payload, installer,
        # and uninstall verification here; run GTK activation on an interactive host.
        run: ./packaging/windows-smoke-test.ps1 -PackageVersion $env:PACKAGE_VERSION -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -SmokeProfileKind terminal-only -SkipBuild -SkipLaunchSmoke

      - name: Upload Windows smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: terminaltiler-windows-smoke-diagnostics-${{ needs.resolve-version.outputs.package_version }}
          path: artifacts/windows-smoke-diagnostics
          if-no-files-found: warn

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: terminaltiler-windows-${{ needs.resolve-version.outputs.package_version }}
          path: |
            ${{ needs.resolve-version.outputs.windows_portable_exe_path }}
            ${{ needs.resolve-version.outputs.windows_zip_path }}
            ${{ needs.resolve-version.outputs.windows_installer_path }}
            ${{ needs.resolve-version.outputs.windows_msi_path }}
          if-no-files-found: error
