name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: bash packaging/install-ubuntu-workflow-deps.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install appimagetool
        run: |
          mkdir -p "$HOME/.local/bin"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O "$HOME/.local/bin/appimagetool"
          chmod +x "$HOME/.local/bin/appimagetool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --features voice-cpal

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo audit
        run: cargo audit

      - name: Lint packaging scripts
        run: |
          shellcheck -x \
            packaging/build-linux-release.sh \
            packaging/build-appimage.sh \
            packaging/build-deb.sh \
            packaging/build-in-container.sh \
            packaging/create-release-tag.sh \
            packaging/resolve-package-version.sh \
            packaging/release-smoke-test.sh \
            packaging/release-verify.sh \
            packaging/run-bundled.sh \
            packaging/versioning.sh

      - name: Verify containerized release build
        run: bash packaging/release-verify.sh

  verify-windows:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --features voice-cpal

      - name: Check Windows target
        run: cargo check --target x86_64-pc-windows-msvc --features voice-cpal

      - name: Build Windows release artifacts
        shell: pwsh
        run: ./packaging/build-windows.ps1 -RequireInstallers

      - name: Run Windows smoke test
        shell: pwsh
        run: ./packaging/windows-smoke-test.ps1 -SmokeProfileKind terminal-only -SkipBuild

      - name: Upload Windows smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: terminaltiler-windows-smoke-diagnostics-ci
          path: packaging/.build/windows-smoke
          if-no-files-found: ignore

  verify-windows-gtk:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-gtk

      - name: Cache gvsbuild GTK runtime
        uses: actions/cache@v4
        with:
          path: C:\gtk-build\gtk\x64\release
          key: windows-gtk-runtime-gvsbuild-v1-${{ runner.os }}

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Prepare native GTK/libadwaita runtime
        shell: pwsh
        run: ./packaging/setup-windows-gtk.ps1 -InstallWithGvsbuild -SkipBuildIfPresent

      - name: Check Windows GTK target
        shell: pwsh
        run: cargo check --target x86_64-pc-windows-msvc --features voice-cpal,windows-gtk-shell

      - name: Build Windows GTK release artifacts
        shell: pwsh
        run: ./packaging/build-windows.ps1 -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -RequireInstallers

      - name: Run Windows GTK smoke test
        shell: pwsh
        run: ./packaging/windows-smoke-test.ps1 -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -SmokeProfileKind terminal-only -SkipBuild

      - name: Upload Windows GTK smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: terminaltiler-windows-gtk-smoke-diagnostics-ci
          path: packaging/.build/windows-smoke
          if-no-files-found: ignore
