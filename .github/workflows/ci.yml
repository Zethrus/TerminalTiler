name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APPIMAGETOOL_VERSION: 1.9.1
  APPIMAGETOOL_SHA256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install system dependencies
        run: bash packaging/install-ubuntu-workflow-deps.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@56f527ce5f0c778165d7ba9409086ccf5c910b6d # cargo-audit

      - name: Install appimagetool (pinned)
        run: |
          mkdir -p "$HOME/.local/bin"
          wget -q "https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage" \
            -O "$HOME/.local/bin/appimagetool"
          echo "${APPIMAGETOOL_SHA256}  $HOME/.local/bin/appimagetool" | sha256sum -c -
          chmod +x "$HOME/.local/bin/appimagetool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked --features voice-cpal

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run cargo audit
        run: cargo audit

      - name: Lint packaging scripts
        run: |
          shellcheck -x \
            packaging/build-linux-release.sh \
            packaging/build-appimage.sh \
            packaging/build-deb.sh \
            packaging/build-in-container.sh \
            packaging/create-release-tag.sh \
            packaging/resolve-package-version.sh \
            packaging/release-smoke-test.sh \
            packaging/release-verify.sh \
            packaging/run-bundled.sh \
            packaging/versioning.sh

  verify-windows:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked --features voice-cpal

      - name: Check Windows target
        run: cargo check --locked --target x86_64-pc-windows-msvc --features voice-cpal

      - name: Build Windows release artifacts
        shell: pwsh
        run: ./packaging/build-windows.ps1 -UseWin32Shell -RequireInstallers

      - name: Run Windows smoke test
        shell: pwsh
        run: ./packaging/windows-smoke-test.ps1 -UseWin32Shell -SmokeProfileKind terminal-only -SkipBuild

      - name: Upload Windows smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: terminaltiler-windows-smoke-diagnostics-ci
          path: artifacts/windows-smoke-diagnostics
          if-no-files-found: warn

  verify-windows-gtk:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: windows-gtk

      - name: Cache gvsbuild GTK runtime
        continue-on-error: true
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: C:\gtk-build\gtk\x64\release
          key: windows-gtk-runtime-gvsbuild-v4-${{ runner.os }}

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Prepare native GTK/libadwaita runtime
        shell: pwsh
        run: ./packaging/setup-windows-gtk.ps1 -InstallWithGvsbuild -SkipBuildIfPresent

      - name: Check Windows GTK target
        shell: pwsh
        run: cargo check --locked --target x86_64-pc-windows-msvc --features voice-cpal,windows-gtk-shell

      - name: Build Windows GTK release artifacts
        shell: pwsh
        run: ./packaging/build-windows.ps1 -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -RequireInstallers

      - name: Run Windows GTK smoke test
        shell: pwsh
        # Hosted Windows runners have no interactive desktop. They compile and
        # package GTK successfully, but GtkApplication exits before activation.
        # Keep installer/payload smoke coverage here; interactive GTK visual
        # coverage runs on an interactive Windows host.
        run: ./packaging/windows-smoke-test.ps1 -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -SmokeProfileKind terminal-only -SkipBuild -SkipLaunchSmoke

      - name: Upload Windows GTK smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: terminaltiler-windows-gtk-smoke-diagnostics-ci
          path: artifacts/windows-smoke-diagnostics
          if-no-files-found: warn
