name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      package_version: ${{ steps.package_version.outputs.package_version }}
      build_date: ${{ steps.package_version.outputs.build_date }}
      deb_path: ${{ steps.package_version.outputs.deb_path }}
      appimage_path: ${{ steps.package_version.outputs.appimage_path }}
      windows_zip_path: ${{ steps.package_version.outputs.windows_zip_path }}
      windows_portable_exe_path: ${{ steps.package_version.outputs.windows_portable_exe_path }}
      windows_installer_path: ${{ steps.package_version.outputs.windows_installer_path }}
      windows_msi_path: ${{ steps.package_version.outputs.windows_msi_path }}

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must look like v0.2.0" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_meta.outputs.tag }}

      - name: Resolve package version
        id: package_version
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: bash packaging/resolve-package-version.sh

  release-linux:
    needs: resolve-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.tag }}

      - name: Install Linux validation dependencies
        run: bash packaging/install-ubuntu-workflow-deps.sh

      - name: Build Linux release artifacts in Debian 13 container
        env:
          PACKAGE_VERSION: ${{ needs.resolve-release.outputs.package_version }}
          BUILD_DATE: ${{ needs.resolve-release.outputs.build_date }}
        run: bash packaging/build-in-container.sh

      - name: Validate Linux release artifacts
        env:
          PACKAGE_VERSION: ${{ needs.resolve-release.outputs.package_version }}
          BUILD_DATE: ${{ needs.resolve-release.outputs.build_date }}
          SMOKE_PROFILE_KIND: terminal-only
          SKIP_PACKAGE_BUILD: 1
        run: bash packaging/release-smoke-test.sh

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: terminaltiler-release-linux-${{ needs.resolve-release.outputs.package_version }}
          path: |
            ${{ needs.resolve-release.outputs.deb_path }}
            ${{ needs.resolve-release.outputs.appimage_path }}
          if-no-files-found: error

  release-windows:
    needs: resolve-release
    runs-on: windows-2022

    steps:
      - name: Check out repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache gvsbuild GTK runtime
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: C:\gtk-build\gtk\x64\release
          key: windows-gtk-runtime-gvsbuild-v4-${{ runner.os }}

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Prepare native GTK/libadwaita runtime
        shell: pwsh
        run: ./packaging/setup-windows-gtk.ps1 -InstallWithGvsbuild -SkipBuildIfPresent

      - name: Build Windows release artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-release.outputs.package_version }}
        run: ./packaging/build-windows.ps1 -PackageVersion $env:PACKAGE_VERSION -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -RequireInstallers

      - name: Validate Windows release artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-release.outputs.package_version }}
        # GitHub-hosted Windows runners do not have an interactive desktop, so
        # GtkApplication exits before activation. Keep build, payload, installer,
        # and uninstall verification here; run GTK activation on an interactive host.
        run: ./packaging/windows-smoke-test.ps1 -PackageVersion $env:PACKAGE_VERSION -UseGtkShell -GtkRuntimeRoot $env:TERMINALTILER_GTK_RUNTIME_ROOT -SmokeProfileKind terminal-only -SkipBuild -SkipLaunchSmoke

      - name: Upload Windows smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: terminaltiler-windows-smoke-diagnostics-release
          path: artifacts/windows-smoke-diagnostics
          if-no-files-found: warn

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: terminaltiler-release-windows-${{ needs.resolve-release.outputs.package_version }}
          path: |
            ${{ needs.resolve-release.outputs.windows_portable_exe_path }}
            ${{ needs.resolve-release.outputs.windows_zip_path }}
            ${{ needs.resolve-release.outputs.windows_installer_path }}
            ${{ needs.resolve-release.outputs.windows_msi_path }}
          if-no-files-found: error

  publish-release:
    needs: [resolve-release, release-linux, release-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download platform release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: terminaltiler-release-*-${{ needs.resolve-release.outputs.package_version }}
          path: dist
          merge-multiple: true

      - name: Verify release assets before publishing
        shell: bash
        env:
          DEB_PATH: ${{ needs.resolve-release.outputs.deb_path }}
          APPIMAGE_PATH: ${{ needs.resolve-release.outputs.appimage_path }}
          WINDOWS_PORTABLE_EXE_PATH: ${{ needs.resolve-release.outputs.windows_portable_exe_path }}
          WINDOWS_ZIP_PATH: ${{ needs.resolve-release.outputs.windows_zip_path }}
          WINDOWS_INSTALLER_PATH: ${{ needs.resolve-release.outputs.windows_installer_path }}
          WINDOWS_MSI_PATH: ${{ needs.resolve-release.outputs.windows_msi_path }}
        run: |
          expected=(
            "$DEB_PATH"
            "$APPIMAGE_PATH"
            "$WINDOWS_PORTABLE_EXE_PATH"
            "$WINDOWS_ZIP_PATH"
            "$WINDOWS_INSTALLER_PATH"
            "$WINDOWS_MSI_PATH"
          )

          missing=0
          for file in "${expected[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing release asset: $file" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            find dist -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            ${{ needs.resolve-release.outputs.deb_path }}
            ${{ needs.resolve-release.outputs.appimage_path }}
            ${{ needs.resolve-release.outputs.windows_portable_exe_path }}
            ${{ needs.resolve-release.outputs.windows_zip_path }}
            ${{ needs.resolve-release.outputs.windows_installer_path }}
            ${{ needs.resolve-release.outputs.windows_msi_path }}
          fail_on_unmatched_files: true

      - name: Verify draft release and every asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          release_json=""
          for attempt in {1..12}; do
            releases_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100")"
            release_json="$(jq -c --arg tag "$RELEASE_TAG" '.[] | select(.tag_name == $tag)' <<<"$releases_json")"
            if [[ -n "$release_json" ]]; then
              break
            fi
            if [[ "$attempt" -eq 12 ]]; then
              echo "Draft release for ${RELEASE_TAG} was not discoverable after 60 seconds" >&2
              exit 1
            fi
            echo "Draft release for ${RELEASE_TAG} is not discoverable yet; retrying in 5 seconds..."
            sleep 5
          done
          echo "RELEASE_ID=$(jq -r '.id' <<<"$release_json")" >> "$GITHUB_ENV"
          jq -e '.draft == true' <<<"$release_json" >/dev/null
          asset_count="$(jq '.assets | length' <<<"$release_json")"
          test "$asset_count" -eq 6
          jq -e '.assets | all(.digest != null and (.digest | test("^sha256:[0-9a-fA-F]{64}$")))' <<<"$release_json" >/dev/null
          for file in \
            "${{ needs.resolve-release.outputs.deb_path }}" \
            "${{ needs.resolve-release.outputs.appimage_path }}" \
            "${{ needs.resolve-release.outputs.windows_portable_exe_path }}" \
            "${{ needs.resolve-release.outputs.windows_zip_path }}" \
            "${{ needs.resolve-release.outputs.windows_installer_path }}" \
            "${{ needs.resolve-release.outputs.windows_msi_path }}"; do
            name="$(basename "$file")"
            remote_digest="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .digest' <<<"$release_json")"
            local_digest="sha256:$(sha256sum "$file" | cut -d' ' -f1)"
            test "$remote_digest" = "$local_digest"
          done

      - name: Publish verified release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false >/dev/null

      - name: Verify published release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")"
          jq -e '.draft == false and .prerelease == false' <<<"$release_json" >/dev/null
          asset_count="$(jq '.assets | length' <<<"$release_json")"
          test "$asset_count" -eq 6
          jq -e '.assets | all(.digest != null and (.digest | test("^sha256:[0-9a-fA-F]{64}$")))' <<<"$release_json" >/dev/null

      - name: Notify TerminalTiler Pro of published Core release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TERMINALTILER_PRO_DISPATCH_TOKEN }}
          CORE_RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}" || {
            echo "TERMINALTILER_PRO_DISPATCH_TOKEN is required" >&2
            exit 1
          }
          jq -nc --arg tag "$CORE_RELEASE_TAG" \
            '{event_type:"terminaltiler-core-release-published", client_payload:{core_release_tag:$tag}}' \
            | gh api --method POST \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                'repos/Zethrus/TerminalTiler-Pro/dispatches' --input -
