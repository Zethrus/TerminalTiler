name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must look like v0.2.0" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_meta.outputs.tag }}

      - name: Resolve package version
        id: package_version
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: bash packaging/resolve-package-version.sh

      - name: Install Linux validation dependencies
        run: bash packaging/install-ubuntu-workflow-deps.sh

      - name: Build Linux release artifacts in Debian 12 container
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.package_version }}
          BUILD_DATE: ${{ steps.package_version.outputs.build_date }}
        run: bash packaging/build-in-container.sh

      - name: Validate Linux release artifacts
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.package_version }}
          BUILD_DATE: ${{ steps.package_version.outputs.build_date }}
          SMOKE_PROFILE_KIND: terminal-only
          SKIP_PACKAGE_BUILD: 1
        run: bash packaging/release-smoke-test.sh

      - name: Publish Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.package_version.outputs.deb_path }}
            ${{ steps.package_version.outputs.appimage_path }}
          fail_on_unmatched_files: true

  release-windows:
    runs-on: windows-2022

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must look like v0.2.0" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_meta.outputs.tag }}

      - name: Resolve package version
        id: package_version
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: bash packaging/resolve-package-version.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify installer toolchain
        shell: pwsh
        run: ./packaging/assert-windows-installer-tools.ps1

      - name: Build Windows release artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.package_version }}
        run: ./packaging/build-windows.ps1 -PackageVersion $env:PACKAGE_VERSION -RequireInstallers

      - name: Validate Windows release artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.package_version }}
        run: ./packaging/windows-smoke-test.ps1 -PackageVersion $env:PACKAGE_VERSION -SkipLaunchSmoke -SmokeProfileKind terminal-only -SkipBuild

      - name: Publish Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: |
            ${{ steps.package_version.outputs.windows_portable_exe_path }}
            ${{ steps.package_version.outputs.windows_installer_path }}
            ${{ steps.package_version.outputs.windows_msi_path }}
          fail_on_unmatched_files: true
