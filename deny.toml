[advisories]
unmaintained = "workspace"
unused-ignored-advisory = "warn"

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "Unicode-3.0",
  "MPL-2.0",
  "Unlicense",
]
confidence-threshold = 0.8
